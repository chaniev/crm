services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false
      BootstrapUser__Login: ${BOOTSTRAP_USER_LOGIN:-headcoach}
      BootstrapUser__FullName: ${BOOTSTRAP_USER_FULL_NAME:-Главный тренер}
      Auth__CookieSecurePolicy: ${BACKEND_AUTH_COOKIE_SECURE_POLICY:-SameAsRequest}
      ClientPhoto__StorageRootPath: ${BACKEND_CLIENT_PHOTO_STORAGE_ROOT:-/app/data/client-photos}
      ClientPhoto__MaxUploadSizeBytes: ${BACKEND_CLIENT_PHOTO_MAX_UPLOAD_BYTES:-10485760}
      Persistence__ApplyMigrationsOnStartup: ${BACKEND_APPLY_MIGRATIONS:-true}
      Persistence__FailStartupOnMigrationError: ${BACKEND_FAIL_ON_MIGRATION_ERROR:-true}
      TechnicalLogging__DirectoryPath: ${BACKEND_TECHNICAL_LOG_DIRECTORY:-/app/logs/technical}
      TechnicalLogging__FileNamePrefix: ${BACKEND_TECHNICAL_LOG_FILE_PREFIX:-gym-crm-api}
      TechnicalLogging__FileSizeLimitMb: ${BACKEND_TECHNICAL_LOG_FILE_SIZE_MB:-20}
      TechnicalLogging__RetentionDays: ${BACKEND_TECHNICAL_LOG_RETENTION_DAYS:-10}
      BotInternalApi__Token: ${BOT_INTERNAL_API_TOKEN}
      BotInternalApi__Enabled: ${BOT_INTERNAL_API_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s
    volumes:
      - backend_client_photos:/app/data/client-photos
      - backend_logs:/app/logs
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_PATH: ${FRONTEND_VITE_API_BASE_PATH:-/api}
        VITE_API_PROXY_TARGET: ${FRONTEND_VITE_API_PROXY_TARGET:-http://backend:8080}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOT_MODE: ${BOT_MODE:-LongPolling}
      BOT_ENABLED: ${BOT_ENABLED:-true}
      BOT_TELEGRAM_TOKEN: ${BOT_TELEGRAM_TOKEN}
      BOT_TELEGRAM_PROXY_URL: ${BOT_TELEGRAM_PROXY_URL:-${HTTPS_PROXY:-${HTTP_PROXY:-}}}
      BOT_TELEGRAM_MTPROXY_URLS: ${BOT_TELEGRAM_MTPROXY_URLS:-}
      BOT_TELEGRAM_API_ID: ${BOT_TELEGRAM_API_ID:-}
      BOT_TELEGRAM_API_HASH: ${BOT_TELEGRAM_API_HASH:-}
      BOT_TELEGRAM_MTPROTO_SESSION_PATH: ${BOT_TELEGRAM_MTPROTO_SESSION_PATH:-/app/data/bot/telegram-mtproto}
      BOT_TELEGRAM_PROXY_FAILOVER_DELAY_SECONDS: ${BOT_TELEGRAM_PROXY_FAILOVER_DELAY_SECONDS:-5}
      BOT_DATABASE_URL: ${BOT_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      CRM_API_BASE_URL: ${CRM_API_BASE_URL:-http://backend:8080}
      CRM_BOT_API_TOKEN: ${CRM_BOT_API_TOKEN}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/live > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s
    volumes:
      - bot_data:/app/data/bot

volumes:
  postgres_data:
  backend_client_photos:
  backend_logs:
  bot_data:
