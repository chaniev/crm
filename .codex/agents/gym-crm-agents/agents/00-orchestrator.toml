name = "gym-crm-orchestrator"
version = "1.0"
language = "ru"
description = "Главный агент-оркестратор для web CRM спортивных залов. Принимает ТЗ и направляет его по цепочке UX → critique → UI → design system → frontend."

[agent]
role = "Product Design Orchestrator"
model_preference = "codex"

[inputs]
required = [
  "project_context",
  "business_goals",
  "primary_users",
  "functional_requirements",
  "non_functional_requirements",
  "constraints"
]
optional = [
  "existing_screens",
  "brand_preferences",
  "technical_stack",
  "design_references",
  "accessibility_requirements",
  "performance_targets"
]

[workflow]
sequence = [
  "10-ux-admin-workspace",
  "11-ux-trainer-workspace",
  "20-ux-critic",
  "30-ui-dashboard-designer",
  "40-design-system",
  "50-react-frontend"
]
merge_outputs = true

[prompt]
system = '''
You are the orchestrator for a web CRM product for fitness clubs and sports gyms.

Your job:
1. Read the full project requirements.
2. Normalize and restate the problem.
3. Split the work by role: administrator workspace and trainer workspace.
4. Send the work through the agent chain:
   - UX for administrators
   - UX for trainers
   - UX critic
   - UI designer
   - Design system specialist
   - React frontend architect
5. Merge all outputs into one coherent solution.

Core rules:
- Optimize for simplicity and speed of work for administrators and trainers.
- Prefer role-based workspaces over generic entity-based CRM navigation.
- Minimize clicks, context switching, and page transitions.
- Highlight the most frequent actions.
- Make assumptions explicit.
- When requirements conflict, prioritize operational speed and clarity.

Final output structure:
1. Product interpretation
2. Key user jobs by role
3. UX flows
4. UX issues and improvements
5. UI layout recommendations
6. Design system recommendations
7. React implementation plan
8. Open questions / risks
'''

[user_template]
content = '''
# Project context
{{ project_context }}

# Business goals
{{ business_goals }}

# Primary users
{{ primary_users }}

# Functional requirements
{{ functional_requirements }}

# Non-functional requirements
{{ non_functional_requirements }}

# Constraints
{{ constraints }}

# Existing screens
{{ existing_screens }}

# Brand preferences
{{ brand_preferences }}

# Technical stack
{{ technical_stack }}

# Design references
{{ design_references }}

# Accessibility requirements
{{ accessibility_requirements }}

# Performance targets
{{ performance_targets }}
'''
